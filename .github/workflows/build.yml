name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed by softprops/action-gh-release to create the release

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # ── Theos toolchain + iPhoneOS16.5 SDK ──────────────────────────────
      # Mirrors the proven install pattern from chelaxian/ios.ratu.sh
      # (.github/workflows/build-offloader-prefs.yml).
      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          brew install ldid make
          mkdir -p "$HOME/theos/sdks"
          git clone --depth 1 --filter=blob:none --sparse https://github.com/theos/sdks.git "$RUNNER_TEMP/theos-sdks"
          git -C "$RUNNER_TEMP/theos-sdks" sparse-checkout set iPhoneOS16.5.sdk
          cp -R "$RUNNER_TEMP/theos-sdks/iPhoneOS16.5.sdk" "$HOME/theos/sdks/"

      - name: Read version
        id: ver
        run: |
          v="$(awk '/^Version:/{print $2; exit}' control)"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo ">> building TGProxyRotation $v"

      # ── Target 1: plain rootless deb (Dopamine / NathanLR / NekoJB / Sileo) ─
      # Mach-O is rootless arm64, no PAC, no sentinel. Theos emits it directly.
      - name: Build rootless deb
        env:
          THEOS: ${{ github.workspace }}/../theos
        run: |
          export THEOS="$HOME/theos"
          gmake clean package FINALPACKAGE=1

      - name: Repack rootless deb (rewrite paths to /var/jb/)
        run: |
          src="$(ls packages/com.ratush.tgproxyrotation_*_iphoneos-arm64.deb | head -1)"
          out="TGProxyRotation-${{ steps.ver.outputs.version }}-rootless.deb"
          # Theos default deb layout uses ./Library/... paths, but iOS rootless
          # dpkg (Dopamine, palera1n rootless) requires ./var/jb/Library/...
          # because the root filesystem is read-only and the jailbreak root
          # is at /var/jb. macOS runners don't have dpkg-deb, so we repack
          # using Python (same approach as the roothide variant below).
          python3 - <<'PYEOF'
          import os, io, gzip, lzma, tarfile, hashlib, time

          src = os.environ['SRC']
          out = os.environ['OUT']

          def read_ar_members(path):
              with open(path,'rb') as f:
                  assert f.read(8) == b'!<arch>\n'
                  members = []
                  while True:
                      hdr = f.read(60)
                      if len(hdr) < 60: break
                      name_field = hdr[:16].decode('ascii','replace').rstrip()
                      size = int(hdr[48:58].strip())
                      body = f.read(size)
                      if size % 2: f.read(1)
                      if name_field.startswith('#1/'):
                          n = int(name_field[3:])
                          real = body[:n].rstrip(b'\x00').decode('ascii')
                          body = body[n:]
                      elif name_field in ('//', '/'):
                          continue
                      elif name_field.startswith('/'):
                          real = name_field
                      else:
                          real = name_field
                      members.append((real, body))
              return members

          def decompress(blob, name):
              if name.endswith('.lzma') or name.endswith('.xz'): return lzma.decompress(blob)
              elif name.endswith('.gz'): return gzip.decompress(blob)
              else: return blob

          members = read_ar_members(src)
          debian_bin = b'2.0\n'
          control_blob = None
          data_blob = None
          data_name = None
          for name, body in members:
              if name == 'debian-binary':       debian_bin = body
              elif name == 'control.tar.gz':    control_blob = body
              elif name.startswith('data.tar.'):
                  data_blob = body
                  data_name = name
          assert control_blob and data_blob

          data_tar_bytes = decompress(data_blob, data_name)
          control_tar_bytes = gzip.decompress(control_blob)

          # Rewrite data.tar.gz: prefix every path with var/jb/
          new_data_io = io.BytesIO()
          md5_entries = []
          with tarfile.open(fileobj=new_data_io, mode='w:gz') as tf:
              src_tf = tarfile.open(fileobj=io.BytesIO(data_tar_bytes), mode='r:')
              for m in src_tf.getmembers():
                  # Skip the root '.' entry
                  if m.name in ('.', './'):
                      continue
                  # Rewrite path: ./Library/... → ./var/jb/Library/...
                  clean = m.name.lstrip('./')
                  new_name = './var/jb/' + clean
                  ti = tarfile.TarInfo(name=new_name)
                  ti.type = m.type
                  ti.mode = m.mode
                  ti.mtime = 0
                  ti.uid = ti.gid = 0
                  ti.uname = ti.gname = ''
                  if m.issym() or m.islnk():
                      ti.linkname = m.linkname
                  elif m.isfile():
                      data = src_tf.extractfile(m).read()
                      ti.size = len(data)
                      # Track md5 for md5sums
                      md5 = hashlib.md5(data).hexdigest()
                      md5_entries.append((clean, md5))
                      tf.addfile(ti, io.BytesIO(data))
                  else:
                      tf.addfile(ti)
              src_tf.close()
          new_data_io.seek(0)
          new_data_gz = new_data_io.getvalue()

          # Rebuild control.tar.gz with updated md5sums
          ctrl_io = io.BytesIO()
          with tarfile.open(fileobj=ctrl_io, mode='w:gz') as tf:
              src_tf = tarfile.open(fileobj=io.BytesIO(control_tar_bytes), mode='r:')
              for m in src_tf.getmembers():
                  if m.isfile() and m.name.rstrip('/').endswith('control'):
                      tf.addfile(m, src_tf.extractfile(m))
                  elif m.isfile() and m.name.rstrip('/').endswith('md5sums'):
                      # Replace with regenerated md5sums
                      lines = []
                      for path, md5 in md5_entries:
                          lines.append(f'{md5}  var/jb/{path}')
                      data = '\n'.join(lines) + '\n'
                      ti = tarfile.TarInfo(name=m.name)
                      ti.size = len(data.encode())
                      ti.mode = 0o644; ti.mtime = 0; ti.uid = ti.gid = 0
                      ti.uname = ti.gname = ''
                      tf.addfile(ti, io.BytesIO(data.encode()))
                  else:
                      tf.addfile(m)
              src_tf.close()
          ctrl_io.seek(0)
          new_control_gz = ctrl_io.getvalue()

          # Assemble .deb (ar archive)
          def ar_member(name, body):
              name = name.ljust(16)[:16]
              size = str(len(body)).ljust(10)[:10]
              hdr = (name + '0'.ljust(12) + '0'.ljust(6) + '0'.ljust(6) +
                     '100644'.ljust(8) + size + '`\n')
              assert len(hdr) == 60
              out = hdr.encode('ascii') + body
              if len(body) % 2: out += b'\n'
              return out

          with open(out, 'wb') as f:
              f.write(b'!<arch>\n')
              f.write(ar_member('debian-binary', debian_bin))
              f.write(ar_member('control.tar.gz', new_control_gz))
              f.write(ar_member('data.tar.gz', new_data_gz))

          sz = os.path.getsize(out)
          print(f'>> rootless deb: {out} ({sz} bytes)')
          # Verify
          for n, b in read_ar_members(out):
              print(f'    member {n}: {len(b)} bytes')
          PYEOF
        env:
          SRC: ${{ github.workspace }}/packages/com.ratush.tgproxyrotation_${{ steps.ver.outputs.version }}_iphoneos-arm64.deb
          OUT: ${{ github.workspace }}/TGProxyRotation-${{ steps.ver.outputs.version }}-rootless.deb

      - name: Verify rootless deb + set output
        id: deb_rootless
        run: |
          out="TGProxyRotation-${{ steps.ver.outputs.version }}-rootless.deb"
          echo ">> rootless deb: $out ($(wc -c < "$out") bytes)"
          echo "path=$out" >> "$GITHUB_OUTPUT"
          echo ">> data.tar contents:"
          ar x "$out" data.tar.gz && tar tzf data.tar.gz && rm -f data.tar.gz

      # ── Target 2: RootHide-targeted deb ────────────────────────────────
      # Same rootless arm64 Mach-O, repacked with two RootHide-specific
      # markers so that RootHide Bootstrap (and Sileo in its context) treats
      # the package as a RootHide one and runs the on-device patcher:
      #   1. control field Architecture: iphoneos-arm64e  (replaces arm64)
      #   2. payload sentinel Library/MobileSubstrate/DynamicLibraries/
      #      TGProxyRotation.dylib.roothidepatch (symlink to
      #      /usr/lib/DynamicPatches/AutoPatches.dylib — exists on-device)
      #
      # We do this by extracting the Theos-built deb, editing control +
      # adding the sentinel, and repacking with dpkg-deb. Doing it here
      # (rather than via Theos's after-stage hook) keeps the Makefile clean
      # and makes the RootHide variant reproducible on every CI build.
      - name: Build RootHide deb (repack with sentinel)
        run: |
          set -euo pipefail
          ROOTLESS="${{ steps.deb_rootless.outputs.path }}"
          RHPATCH="TGProxyRotation-${{ steps.ver.outputs.version }}-roothide.deb"
          python3 - <<'PYEOF'
          import os, sys, io, gzip, lzma, tarfile, struct, time, subprocess

          ROOTLESS = os.environ['ROOTLESS']
          RHPATCH  = os.environ['RHPATCH']
          GITHUB_W = os.environ['GITHUB_WORKSPACE']

          def read_ar_members(path):
              with open(path,'rb') as f:
                  assert f.read(8) == b'!<arch>\n'
                  members = []
                  while True:
                      hdr = f.read(60)
                      if len(hdr) < 60: break
                      name_field = hdr[:16].decode('ascii','replace').rstrip()
                      size = int(hdr[48:58].strip())
                      body = f.read(size)
                      if size % 2: f.read(1)
                      # GNU long-name: #1/<n> means real name is first n bytes of body
                      if name_field.startswith('#1/'):
                          n = int(name_field[3:])
                          real = body[:n].rstrip(b'\x00').decode('ascii')
                          body = body[n:]
                      elif name_field == '//':
                          continue  # long-name index, ignore
                      elif name_field == '/':
                          continue  # symbol table
                      elif name_field.startswith('/'):
                          # name is offset into the // table — skip, we don't need it
                          real = name_field
                      else:
                          real = name_field
                      members.append((real, body))
              return members

          members = read_ar_members(os.path.join(GITHUB_W, ROOTLESS))
          debian_bin = b'2.0\n'
          control_blob = None
          data_blob = None
          for name, body in members:
              if name == 'debian-binary':       debian_bin   = body
              elif name == 'control.tar.gz':    control_blob = body
              elif name.startswith('data.tar.'): data_blob   = body
          assert control_blob and data_blob, f'missing members: {[m[0] for m in members]}'

          # Extract data tarball (Theos uses lzma)
          def decompress(blob, name):
              if   name.endswith('.lzma') or name.endswith('.xz'):  return lzma.decompress(blob)
              elif name.endswith('.gz'):                            return gzip.decompress(blob)
              else:                                                 return blob

          data_name = next(n for n,_ in members if n.startswith('data.tar.'))
          data_tar_bytes  = decompress(data_blob, data_name)
          control_tar_bytes = gzip.decompress(control_blob)

          def tar_add_path(tf, arcname, *, data=None, symlink=None):
              ti = tarfile.TarInfo(name=arcname)
              if symlink is not None:
                  ti.type = tarfile.SYMTYPE
                  ti.linkname = symlink
                  ti.mode = 0o777
                  ti.mtime = 0
                  ti.uid = ti.gid = 0
                  ti.uname = ti.gname = ''
              else:
                  ti.size = len(data or b'')
                  ti.mode = 0o644
                  ti.mtime = 0
                  ti.uid = ti.gid = 0
                  ti.uname = ti.gname = ''
              tf.addfile(ti, io.BytesIO(data or b''))

          # Rebuild data.tar.gz: copy original members, flip architecture in control,
          # add .roothidepatch sentinel next to the dylib.
          data_io = io.BytesIO()
          with tarfile.open(fileobj=data_io, mode='w:gz') as tf:
              src = tarfile.open(fileobj=io.BytesIO(data_tar_bytes), mode='r:')
              for m in src.getmembers():
                  if m.isfile():
                      tf.addfile(m, src.extractfile(m))
                  else:
                      # preserve dirs/symlinks as-is
                      tf.addfile(m)
              src.close()
              # Add the RootHide sentinel as a symlink
              tar_add_path(tf, './Library/MobileSubstrate/DynamicLibraries/TGProxyRotation.dylib.roothidepatch',
                           symlink='/usr/lib/DynamicPatches/AutoPatches.dylib')
          data_io.seek(0)
          new_data_gz = data_io.getvalue()

          # Rebuild control.tar.gz with patched Architecture field
          ctrl_io = io.BytesIO()
          with tarfile.open(fileobj=ctrl_io, mode='w:gz') as tf:
              src = tarfile.open(fileobj=io.BytesIO(control_tar_bytes), mode='r:')
              for m in src.getmembers():
                  if m.isfile() and m.name.rstrip('/').endswith('control'):
                      txt = src.extractfile(m).read().decode('utf-8')
                      txt = txt.replace('Architecture: iphoneos-arm64',
                                        'Architecture: iphoneos-arm64e')
                      ti = tarfile.TarInfo(name=m.name)
                      ti.size = len(txt.encode('utf-8'))
                      ti.mode = 0o644; ti.mtime = 0; ti.uid = ti.gid = 0
                      ti.uname = ti.gname = ''
                      tf.addfile(ti, io.BytesIO(txt.encode('utf-8')))
                  else:
                      tf.addfile(m)
              src.close()
          ctrl_io.seek(0)
          new_control_gz = ctrl_io.getvalue()

          # Assemble the .deb as a portable `ar` archive (BSD/GNU-compatible:
          # short member names, no symbol table, no long-name index).
          def ar_member(name, body):
              name = name.ljust(16)[:16]
              size = str(len(body)).ljust(10)[:10]
              hdr  = (name +
                      str(int(time.time())).ljust(12) +   # mtime
                      '0'.ljust(6) +                       # owner
                      '0'.ljust(6) +                       # group
                      '100644'.ljust(8) +                  # mode
                      size + '`\n')
              assert len(hdr) == 60, len(hdr)
              out = hdr.encode('ascii') + body
              if len(body) % 2: out += b'\n'
              return out

          with open(os.path.join(GITHUB_W, RHPATCH), 'wb') as f:
              f.write(b'!<arch>\n')
              f.write(ar_member('debian-binary',  debian_bin))
              f.write(ar_member('control.tar.gz', new_control_gz))
              f.write(ar_member('data.tar.gz',    new_data_gz))

          sz = os.path.getsize(os.path.join(GITHUB_W, RHPATCH))
          print(f'>> roothide deb: {RHPATCH} ({sz} bytes)')
          # sanity: re-read and report members
          for n, b in read_ar_members(os.path.join(GITHUB_W, RHPATCH)):
              print(f'    member {n}: {len(b)} bytes')
          PYEOF
        env:
          ROOTLESS: ${{ steps.deb_rootless.outputs.path }}
          RHPATCH: TGProxyRotation-${{ steps.ver.outputs.version }}-roothide.deb

      # ── Target 3: Sideload dylib (no MobileSubstrate dependency) ────────
      - name: Build sideload dylib
        env:
          THEOS: ${{ github.workspace }}/../theos
        run: |
          export THEOS="$HOME/theos"
          gmake -f Makefile.dylib clean
          gmake -f Makefile.dylib FINALPACKAGE=1

      - name: Locate + rename sideload dylib
        id: dylib
        run: |
          src=".theos/obj/TGProxyRotation.dylib"
          [ -f "$src" ] || src="$(find .theos/obj -name 'TGProxyRotation.dylib' | head -1)"
          out="TGProxyRotation-${{ steps.ver.outputs.version }}.dylib"
          cp "$src" "$out"
          echo "path=$out" >> "$GITHUB_OUTPUT"
          echo ">> dylib: $out ($(wc -c < "$out") bytes)"

      # ── Hash artifacts ──────────────────────────────────────────────────
      - name: Hash artifacts
        run: |
          shasum -a 256 \
            "TGProxyRotation-${{ steps.ver.outputs.version }}-rootless.deb" \
            "TGProxyRotation-${{ steps.ver.outputs.version }}-roothide.deb" \
            "TGProxyRotation-${{ steps.ver.outputs.version }}.dylib" \
            | tee SHA256SUMS.txt

      # ── Always upload artifacts (PR/push runs too) ──────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: TGProxyRotation-${{ steps.ver.outputs.version }}
          path: |
            TGProxyRotation-${{ steps.ver.outputs.version }}-rootless.deb
            TGProxyRotation-${{ steps.ver.outputs.version }}-roothide.deb
            TGProxyRotation-${{ steps.ver.outputs.version }}.dylib
            SHA256SUMS.txt
          if-no-files-found: error

      # ── Release on tag push ─────────────────────────────────────────────
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: TGProxyRotation ${{ steps.ver.outputs.version }}
          tag_name: ${{ github.ref_name }}
          files: |
            TGProxyRotation-${{ steps.ver.outputs.version }}-rootless.deb
            TGProxyRotation-${{ steps.ver.outputs.version }}-roothide.deb
            TGProxyRotation-${{ steps.ver.outputs.version }}.dylib
            SHA256SUMS.txt
          body: |
            Automatic build of TGProxyRotation `${{ steps.ver.outputs.version }}` from tag `${{ github.ref_name }}`.

            ## Downloads — pick the one matching your setup

            | File | For |
            |---|---|
            | `TGProxyRotation-${{ steps.ver.outputs.version }}-rootless.deb` | **Rootless jailbreaks**: Dopamine, palera1n rootless, NathanLR, NekoJB — install via Sileo. arm64, no PAC, no RootHide sentinel. |
            | `TGProxyRotation-${{ steps.ver.outputs.version }}-roothide.deb` | **RootHide Bootstrap** — same binary, repacked with `iphoneos-arm64e` architecture + `.roothidepatch` sentinel so RootHide runs its on-device patcher. |
            | `TGProxyRotation-${{ steps.ver.outputs.version }}.dylib` | **Sideload (no jailbreak)** — inject via Sideloadly or TrollFools into the Telegram IPA. |

            ## SHA256
            See `SHA256SUMS.txt`.

            Binaries are also mirrored on the APT repo at <https://ios.ratu.sh>.
          generate_release_notes: true
          make_latest: true
