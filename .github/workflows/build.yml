name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed by softprops/action-gh-release to create the release

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # ── Theos toolchain + iPhoneOS16.5 SDK ──────────────────────────────
      # Mirrors the proven install pattern from chelaxian/ios.ratu.sh
      # (.github/workflows/build-offloader-prefs.yml).
      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          brew install ldid make
          mkdir -p "$HOME/theos/sdks"
          git clone --depth 1 --filter=blob:none --sparse https://github.com/theos/sdks.git "$RUNNER_TEMP/theos-sdks"
          git -C "$RUNNER_TEMP/theos-sdks" sparse-checkout set iPhoneOS16.5.sdk
          cp -R "$RUNNER_TEMP/theos-sdks/iPhoneOS16.5.sdk" "$HOME/theos/sdks/"

      - name: Read version
        id: ver
        run: |
          v="$(awk '/^Version:/{print $2; exit}' control)"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo ">> building TGProxyRotation $v"

      # ── Target 1: plain rootless deb (Dopamine / NathanLR / NekoJB / Sileo) ─
      # Mach-O is rootless arm64, no PAC, no sentinel. Theos emits it directly.
      - name: Build rootless deb
        env:
          THEOS: ${{ github.workspace }}/../theos
        run: |
          export THEOS="$HOME/theos"
          gmake clean package FINALPACKAGE=1

      - name: Locate + rename rootless deb
        id: deb_rootless
        run: |
          src="$(ls packages/com.ratush.tgproxyrotation_*_iphoneos-arm64.deb | head -1)"
          out="TGProxyRotation-${{ steps.ver.outputs.version }}-rootless.deb"
          cp "$src" "$out"
          echo "path=$out" >> "$GITHUB_OUTPUT"
          echo ">> rootless deb: $out ($(wc -c < "$out") bytes)"

      # ── Target 2: RootHide-targeted deb ────────────────────────────────
      # Same rootless arm64 Mach-O, repacked with two RootHide-specific
      # markers so that RootHide Bootstrap (and Sileo in its context) treats
      # the package as a RootHide one and runs the on-device patcher:
      #   1. control field Architecture: iphoneos-arm64e  (replaces arm64)
      #   2. payload sentinel Library/MobileSubstrate/DynamicLibraries/
      #      TGProxyRotation.dylib.roothidepatch (symlink to
      #      /usr/lib/DynamicPatches/AutoPatches.dylib — exists on-device)
      #
      # We do this by extracting the Theos-built deb, editing control +
      # adding the sentinel, and repacking with dpkg-deb. Doing it here
      # (rather than via Theos's after-stage hook) keeps the Makefile clean
      # and makes the RootHide variant reproducible on every CI build.
      - name: Build RootHide deb (repack with sentinel)
        run: |
          set -euo pipefail
          ROOTLESS="${{ steps.deb_rootless.outputs.path }}"
          RHPATCH="TGProxyRotation-${{ steps.ver.outputs.version }}-roothide.deb"
          WORK="$RUNNER_TEMP/roothide-repack"
          rm -rf "$WORK"; mkdir -p "$WORK/root"
          cd "$WORK/root"

          # macOS has no dpkg-deb, so unpack the .deb via plain `ar` + `tar`.
          ar x "$GITHUB_WORKSPACE/$ROOTLESS"
          ls -la

          # Theos emits data.tar.lzma (not .gz). Find the actual data member.
          DATA_TAR="$(ls data.tar.* 2>/dev/null | head -1)"
          echo ">> data tarball found: $DATA_TAR"
          case "$DATA_TAR" in
            *.lzma) DECOMP="lzma -d -c" ;;
            *.xz)   DECOMP="xz -d -c"   ;;
            *.gz)   DECOMP="gzip -d -c" ;;
            *)      DECOMP="cat"        ;;
          esac

          mkdir -p data ctrl
          $DECOMP < "$DATA_TAR" | (cd data && tar xf -)
          (cd ctrl && tar -xzf ../control.tar.gz)
          echo ">> extracted. data/ tree:"; find data -type f -o -type l | sed 's/^/   /'

          # 1) Mark the package as arm64e so RootHide/Sileo picks it up.
          sed -i '' 's/^Architecture: iphoneos-arm64$/Architecture: iphoneos-arm64e/' \
            "ctrl/control"

          # 2) Drop the .roothidepatch sentinel next to the dylib.
          DYLIB_DIR="data/Library/MobileSubstrate/DynamicLibraries"
          ln -sf /usr/lib/DynamicPatches/AutoPatches.dylib \
            "$DYLIB_DIR/TGProxyRotation.dylib.roothidepatch"
          ls -la "$DYLIB_DIR"

          # Repack control.tar.gz and data.tar.gz (gzip -n for reproducibility).
          (cd ctrl && tar czf "$WORK/control.tar.gz" --owner=0 --group=0 -n .)
          (cd data && tar czf "$WORK/data.tar.gz"    --owner=0 --group=0 -n .)
          echo "2.0" > "$WORK/debian-binary"

          # Re-assemble the .deb as a BSD `ar` archive.
          ar rcs "$GITHUB_WORKSPACE/$RHPATCH" \
            "$WORK/debian-binary" \
            "$WORK/control.tar.gz" \
            "$WORK/data.tar.gz"
          echo ">> roothide deb: $RHPATCH ($(wc -c < "$GITHUB_WORKSPACE/$RHPATCH") bytes)"

      # ── Target 3: Sideload dylib (no MobileSubstrate dependency) ────────
      - name: Build sideload dylib
        env:
          THEOS: ${{ github.workspace }}/../theos
        run: |
          export THEOS="$HOME/theos"
          gmake -f Makefile.dylib clean
          gmake -f Makefile.dylib FINALPACKAGE=1

      - name: Locate + rename sideload dylib
        id: dylib
        run: |
          src=".theos/obj/TGProxyRotation.dylib"
          [ -f "$src" ] || src="$(find .theos/obj -name 'TGProxyRotation.dylib' | head -1)"
          out="TGProxyRotation-${{ steps.ver.outputs.version }}.dylib"
          cp "$src" "$out"
          echo "path=$out" >> "$GITHUB_OUTPUT"
          echo ">> dylib: $out ($(wc -c < "$out") bytes)"

      # ── Hash artifacts ──────────────────────────────────────────────────
      - name: Hash artifacts
        run: |
          shasum -a 256 \
            "TGProxyRotation-${{ steps.ver.outputs.version }}-rootless.deb" \
            "TGProxyRotation-${{ steps.ver.outputs.version }}-roothide.deb" \
            "TGProxyRotation-${{ steps.ver.outputs.version }}.dylib" \
            | tee SHA256SUMS.txt

      # ── Always upload artifacts (PR/push runs too) ──────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: TGProxyRotation-${{ steps.ver.outputs.version }}
          path: |
            TGProxyRotation-${{ steps.ver.outputs.version }}-rootless.deb
            TGProxyRotation-${{ steps.ver.outputs.version }}-roothide.deb
            TGProxyRotation-${{ steps.ver.outputs.version }}.dylib
            SHA256SUMS.txt
          if-no-files-found: error

      # ── Release on tag push ─────────────────────────────────────────────
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: TGProxyRotation ${{ steps.ver.outputs.version }}
          tag_name: ${{ github.ref_name }}
          files: |
            TGProxyRotation-${{ steps.ver.outputs.version }}-rootless.deb
            TGProxyRotation-${{ steps.ver.outputs.version }}-roothide.deb
            TGProxyRotation-${{ steps.ver.outputs.version }}.dylib
            SHA256SUMS.txt
          body: |
            Automatic build of TGProxyRotation `${{ steps.ver.outputs.version }}` from tag `${{ github.ref_name }}`.

            ## Downloads — pick the one matching your setup

            | File | For |
            |---|---|
            | `TGProxyRotation-${{ steps.ver.outputs.version }}-rootless.deb` | **Rootless jailbreaks**: Dopamine, palera1n rootless, NathanLR, NekoJB — install via Sileo. arm64, no PAC, no RootHide sentinel. |
            | `TGProxyRotation-${{ steps.ver.outputs.version }}-roothide.deb` | **RootHide Bootstrap** — same binary, repacked with `iphoneos-arm64e` architecture + `.roothidepatch` sentinel so RootHide runs its on-device patcher. |
            | `TGProxyRotation-${{ steps.ver.outputs.version }}.dylib` | **Sideload (no jailbreak)** — inject via Sideloadly or TrollFools into the Telegram IPA. |

            ## SHA256
            See `SHA256SUMS.txt`.

            Binaries are also mirrored on the APT repo at <https://ios.ratu.sh>.
          generate_release_notes: true
          make_latest: true
